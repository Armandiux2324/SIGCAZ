<div class="registers-view">
  <h1 class="registers-title">Gestión de Registros</h1>

  <div class="registers-toolbar">
    <div class="search-box">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="search-input" placeholder="Buscar Registros...">
    </div>

    <button class="btn-new-register">
      Nuevo Registro
    </button>
  </div>

  <div class="registers-list">
    <article class="register-card">
      <div class="register-icon">
        <img src="image.png" class="cowboy-icon" />
      </div>

      <div class="register-info">
        <p><span class="info-label">Origen:</span> Nacional</p>
        <p><span class="info-label">Estado:</span> Zacatecas</p>
        <p><span class="info-label">Municipio:</span> Zacatecas</p>
        <p><span class="info-label">Tipo de Hospedaje:</span> Zacatecas</p>
        <p><span class="info-label">Hospedaje al que llegarán:</span> Zacatecas</p>
        <p><span class="info-label">Días de estancia:</span> Zacatecas</p>
        <p><span class="info-label">Transporte que usarán:</span> Zacatecas</p>
      </div>

      <div class="register-actions">
        <button class="action-btn" title="Código QR">
          <i class="bi bi-qr-code"></i>
        </button>
        <button class="action-btn" title="Editar">
          <i class="bi bi-pencil-square"></i>
        </button>
        <button class="action-btn action-btn--danger" title="Eliminar">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </article>



    <nav class="pagination">
      <button class="page-btn page-btn--nav">Anterior</button>

      <div class="page-numbers">
        <button class="page-btn page-btn--number page-btn--active">1</button>
        <button class="page-btn page-btn--number">2</button>
        <button class="page-btn page-btn--number">3</button>
      </div>

      <button class="page-btn page-btn--nav">Siguiente</button>
    </nav>
  </div>
